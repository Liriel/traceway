name: benchmark-symbolicator

on:
  workflow_dispatch:
    inputs:
      benchtime:
        description: 'Go -benchtime per benchmark (e.g. 2s, 100x)'
        required: true
        default: '2s'
      count:
        description: 'Go -count, repetitions per benchmark for variance'
        required: true
        default: '6'

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache oxc shim build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/app/symbolicator/oxc-shim/target
          key: oxc-shim-${{ runner.os }}-${{ hashFiles('backend/app/symbolicator/oxc-shim/Cargo.lock') }}

      - name: Run benchmarks
        env:
          BENCHTIME: ${{ inputs.benchtime }}
          COUNT: ${{ inputs.count }}
          OUT: ${{ github.workspace }}/symbolicator-bench.txt
        run: ./scripts/benchmark-symbolicator.sh

      - name: Publish summary
        run: |
          {
            echo '## Symbolicator bundle parser benchmarks (goja vs oxc)'
            echo
            echo '```'
            cat "$GITHUB_WORKSPACE/symbolicator-bench.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: symbolicator-bench
          path: symbolicator-bench.txt
